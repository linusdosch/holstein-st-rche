<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holstein Störche 🦢</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #title-bar {
    font-size: 13px; color: #fff;
    text-shadow: 0 0 10px #0055bb, 0 0 20px #0055bb;
    margin-bottom: 6px; letter-spacing: 2px;
  }
  #title-bar span.r { color: #e30613; text-shadow: 0 0 10px #e30613; }
  #title-bar span.b { color: #4499ff; text-shadow: 0 0 10px #4499ff; }
  #game-container {
    position: relative; width: 400px; height: 580px;
    overflow: hidden;
    border: 4px solid #003f8a;
    box-shadow: 0 0 20px #003f8a, 0 0 50px #001a55, inset 0 0 15px rgba(0,50,150,0.3);
    image-rendering: pixelated;
  }
  canvas { display: block; image-rendering: pixelated; }
  #ui {
    position: absolute; top: 8px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 12px;
    pointer-events: none;
  }
  .score-box {
    background: rgba(0,10,40,0.85); border: 2px solid #0055dd;
    padding: 6px 10px; color: #fff; font-size: 9px;
    text-shadow: 0 0 8px #4499ff; box-shadow: 0 0 8px #0033aa;
  }
  .score-box .val { color: #4499ff; font-size: 12px; }
  #storch-counter {
    position: absolute; bottom: 14px; left: 12px;
    background: rgba(0,10,40,0.85); border: 2px solid #0055dd;
    padding: 5px 9px; color: #fff; font-size: 8px;
    text-shadow: 0 0 6px #4499ff; pointer-events: none;
  }
  #holstein-bar {
    position: absolute; bottom: 14px; right: 12px;
    background: rgba(0,10,40,0.85); border: 2px solid #0055dd;
    padding: 5px 9px; font-size: 7px; color: #aaccff;
    text-shadow: 0 0 5px #4499ff; pointer-events: none;
    display: flex; align-items: center; gap: 5px;
  }
  #holstein-pips { display: flex; gap: 3px; }
  .pip { width:8px; height:8px; background:#223355; border:1px solid #334466; }
  .pip.filled { background:#e30613; border-color:#ff4444; box-shadow: 0 0 4px #e30613; }
  .pip.holstein { background:#ffdd00; border-color:#ffee44; box-shadow: 0 0 6px #ffdd00; animation: pipPulse 0.5s infinite; }
  @keyframes pipPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #overlay {
    position: absolute; top:0; left:0; right:0; bottom:0;
    background: rgba(0,5,20,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 16px;
  }
  .btn {
    background: transparent; border: 3px solid #0055dd; color: #fff;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    padding: 12px 20px; cursor: pointer;
    text-shadow: 0 0 8px #4499ff; box-shadow: 0 0 15px #003f8a;
    animation: pulse 1.5s infinite; margin: 6px 0; width: 220px;
  }
  .btn:hover { background: rgba(0,80,200,0.3); }
  .btn.red { border-color:#e30613; text-shadow:0 0 8px #e30613; box-shadow:0 0 15px #cc0000; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
  .char-select { display: flex; gap: 16px; margin: 14px 0; }
  .char-card {
    width: 110px; height: 130px; border: 3px solid #0055dd;
    background: rgba(0,15,50,0.8); cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s; box-shadow: 0 0 8px #0033aa; position: relative;
  }
  .char-card:hover { border-color:#4499ff; box-shadow:0 0 18px #0055dd; transform:scale(1.04); }
  .char-card.selected { border-color:#e30613; box-shadow:0 0 20px #e30613,0 0 40px #cc0000; animation:selPulse 0.8s infinite; }
  @keyframes selPulse { 0%,100%{box-shadow:0 0 20px #e30613} 50%{box-shadow:0 0 35px #e30613,0 0 60px #cc0000} }
  .char-label { font-size:7px; color:#aaccff; text-shadow:0 0 5px #4499ff; text-align:center; line-height:1.5; }
  .char-card.selected .char-label { color:#ff6666; text-shadow:0 0 5px #e30613; }
  .selected-badge { position:absolute; top:-10px; right:-10px; background:#e30613; color:#fff; font-size:7px; padding:2px 5px; border:2px solid #fff; }
  .hs-table { width:100%; border-collapse:collapse; margin:6px 0; }
  .hs-table td { padding:3px 6px; font-size:7px; border-bottom:1px solid #112244; }
  .hs-table .hs-rank { color:#4499ff; width:20px; }
  .hs-table .hs-name { color:#aaccff; text-align:left; max-width:80px; overflow:hidden; }
  .hs-table .hs-pts  { color:#ffff88; text-align:right; }
  .hs-table .hs-fish { color:#88aadd; text-align:right; width:36px; }
  .hs-new { color:#e30613 !important; text-shadow:0 0 6px #e30613; animation:pulse 0.8s infinite; }
  /* Name input */
  #nameInput {
    background: rgba(0,10,40,0.9); border: 3px solid #e30613;
    color: #fff; font-family: 'Press Start 2P', monospace; font-size: 11px;
    padding: 10px 14px; text-align: center; width: 200px; margin: 8px 0;
    text-shadow: 0 0 6px #fff; box-shadow: 0 0 15px #cc0000;
    outline: none; letter-spacing: 2px;
  }
  #nameInput::placeholder { color:#334466; font-size:8px; }
</style>
</head>
<body>
<div id="title-bar">
  <span class="b">HOLSTEIN</span> <span class="r">STÖRCHE</span> <span>🦢</span>
</div>
<div id="game-container">
  <canvas id="gameCanvas" width="400" height="580"></canvas>
  <div id="ui">
    <div class="score-box">TORE<br><span class="val" id="scoreDisplay">0</span></div>
    <div class="score-box">REKORD<br><span class="val" id="hiDisplay">0</span></div>
  </div>
  <div id="storch-counter">🦢 <span id="storchCount">0</span></div>
  <div id="holstein-bar">
    <span id="holsteinLabel">KSV:</span>
    <div id="holstein-pips"></div>
  </div>
  <div id="overlay"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 580;

// ---- IMAGES ----
let faceCanvas=null, shipCanvas=null;
let imagesReady=0;

function processBlackBg(img) {
  const oc=document.createElement('canvas');
  const sz=256; oc.width=sz; oc.height=sz;
  const oc2=oc.getContext('2d');
  oc2.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,0,0,sz,sz);
  const id=oc2.getImageData(0,0,sz,sz); const d=id.data;
  for(let i=0;i<d.length;i+=4) {
    if(d[i]<40&&d[i+1]<40&&d[i+2]<40) { d[i+3]=0; }
    else if(d[i]<75&&d[i+1]<75&&d[i+2]<75) {
      const b=(d[i]+d[i+1]+d[i+2])/3;
      d[i+3]=Math.round((b/75)*255);
    }
  }
  oc2.putImageData(id,0,0); return oc;
}

function processLogo(img) {
  const oc=document.createElement('canvas');
  const sz=256; oc.width=sz; oc.height=sz;
  const g=oc.getContext('2d');
  const scale=Math.min(sz/img.naturalWidth, sz/img.naturalHeight)*0.92;
  const w=img.naturalWidth*scale, h=img.naturalHeight*scale;
  g.drawImage(img,(sz-w)/2,(sz-h)/2,w,h);
  return oc;
}
const rawFace=new Image();
rawFace.onload=()=>{ faceCanvas=processLogo(rawFace); imagesReady++; checkReady(); };

function loadHymne() {
  try {
    const bin=atob(mp3b64), arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    getAC().decodeAudioData(arr.buffer,buf=>{ hymneBuf=buf; });
  }catch(e){}
}
function playHymne() {
  if(!hymneBuf) return;
  stopHymne();
  const ac=getAC();
  hymneSource=ac.createBufferSource();
  hymneSource.buffer=hymneBuf; hymneSource.loop=false;
  const gain=ac.createGain(); gain.gain.value=0.75;
  hymneSource.connect(gain); gain.connect(ac.destination);
  hymneSource.start();
  hymneSource.onended=()=>hymneSource=null;
}
function stopHymne() {
  if(hymneSource){ try{hymneSource.stop();}catch(e){} hymneSource=null; }
}
function playBeep(freq,dur,type='square',vol=0.08) {
  try {
    const ac=getAC(),osc=ac.createOscillator(),g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type=type; osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    osc.start(); osc.stop(ac.currentTime+dur+0.01);
  }catch(e){}
}
function playJump()  { playBeep(350,0.07,'square',0.07); }
function playScore() { playBeep(660,0.06,'square',0.06); }
function playDeath() { [[380,0],[250,110],[150,220],[80,340]].forEach(([f,t])=>setTimeout(()=>playBeep(f,0.09),t)); }
function playHolsteinFanfare() {
  [[523,0],[659,0.08],[784,0.16],[1047,0.24],[784,0.36],[1047,0.44]].forEach(([f,t])=>
    setTimeout(()=>playBeep(f,0.12,'square',0.15),t*1000));
}

// ---- HIGHSCORES ----
function loadHighscores() {
  try { return JSON.parse(localStorage.getItem('holstein_hs')||'[]'); } catch(e) { return []; }
}
function saveHighscores(list) {
  try { localStorage.setItem('holstein_hs',JSON.stringify(list)); } catch(e) {}
}
function isTop5(pts) {
  const list=loadHighscores();
  return list.length<5 || pts>list[list.length-1].pts;
}
function addHighscore(name,pts,fish) {
  const list=loadHighscores();
  list.push({name:name||'???',pts,fish,date:new Date().toLocaleDateString('de-DE')});
  list.sort((a,b)=>b.pts-a.pts);
  list.splice(5);
  saveHighscores(list);
  return list;
}

const pipes=[], storche=[], particles=[], clouds=[];
for(let i=0;i<7;i++) clouds.push({
  x:Math.random()*W, y:20+Math.random()*(H*0.5),
  r:16+Math.random()*24, speed:0.12+Math.random()*0.3, alpha:0.5+Math.random()*0.35
});

function spawnPipe() {
  const gap=160+Math.floor(Math.random()*21);
  const topH=80+Math.random()*(H-gap-160);
  const doStorch=(pipeCount===nextStorchAt);
  if(doStorch) nextStorchAt=pipeCount+3+Math.floor(Math.random()*3); // every 3-5
  pipes.push({x:W+10,top:topH,gap,scored:false,storchSpawned:false,hasStorch:doStorch});
  pipeCount++;
}
function spawnStorch(pipe) {
  const mid=pipe.top+pipe.gap/2;
  const isGold=(holsteinPips===4&&!holsteinModus);
  storche.push({x:pipe.x+PIPE_W/2+60,y:mid+(Math.random()-0.5)*30,collected:false,missed:false,bob:Math.random()*Math.PI*2,gold:isGold});
}
function spawnParticles(x,y,colors,n=10) {
  colors.forEach(color=>{
    for(let i=0;i<Math.ceil(n/colors.length);i++) {
      const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3.5;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,color,r:2+Math.random()*4,life:35+Math.random()*25});
    }
  });
}
function spawnHolsteinKonfetti(x,y) {
  ['#e30613','#ffffff','#0055dd','#ffdd00','#ff6666','#aaddff'].forEach(color=>{
    for(let i=0;i<7;i++) {
      const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,alpha:1,color,r:2+Math.random()*5,life:55+Math.random()*30});
    }
  });
}

// ---- DRAW ----
function drawBG() {
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#5eadf0'); grad.addColorStop(0.55,'#a9d6ff'); grad.addColorStop(1,'#eaf6ff');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  if(holsteinModus) {
    ctx.save(); ctx.globalAlpha=0.08+Math.sin(frame*0.05)*0.04;
    const cg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W);
    cg.addColorStop(0,'#ffdd00'); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.fillRect(0,0,W,H); ctx.restore();
  }
  for(let i=0;i<6;i++) {
    const t=frame*0.01+i*1.1;
    const x=(Math.sin(t)*0.45+0.5)*W,y=(Math.cos(t*0.8)*0.4+0.5)*H;
    ctx.save(); ctx.globalAlpha=0.05;
    const cg=ctx.createRadialGradient(x,y,0,x,y,55);
    cg.addColorStop(0,'#aaddff'); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(x,y,55,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  clouds.forEach(c=>{
    c.x-=c.speed; if(c.x<-c.r*2){c.x=W+c.r*2;c.y=20+Math.random()*(H*0.5);}
    ctx.save(); ctx.globalAlpha=c.alpha; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.r,c.r*0.55,0,0,Math.PI*2); ctx.ellipse(c.x+c.r*0.8,c.y+c.r*0.12,c.r*0.65,c.r*0.42,0,0,Math.PI*2); ctx.ellipse(c.x-c.r*0.8,c.y+c.r*0.12,c.r*0.6,c.r*0.4,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
  ctx.fillStyle='#e30613'; ctx.fillRect(0,0,W,10); ctx.fillRect(0,H-10,W,10);
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,10,W,4); ctx.fillRect(0,H-14,W,4);
  ctx.fillStyle='#003f8a'; ctx.fillRect(0,14,W,4); ctx.fillRect(0,H-18,W,4);
}

function drawSeaweed(ctx, x, y, h, seed) {
  // pixel-art seaweed strips
  const s=seed%3; const colors=['#118844','#22aa55','#33cc66'];
  ctx.fillStyle=colors[s]; 
  for(let i=0;i<h;i+=6) {
    const wave=(Math.sin(frame*0.04+(seed+i)*0.7)*3)|0;
    ctx.fillRect(x+wave,y+i,4,5);
  }
  // tip
  ctx.fillStyle='#55ee88'; ctx.fillRect(x+(Math.sin(frame*0.04+seed)*3|0)-2,y,6,5);
}
function drawAnchor(ctx, x, y) {
  ctx.fillStyle='#888899';
  ctx.fillRect(x,y-8,4,16); // shaft
  ctx.fillRect(x-5,y-8,14,3); // crossbar
  ctx.fillRect(x-5,y-10,3,5); // arm left
  ctx.fillRect(x+6,y-10,3,5); // arm right
  ctx.fillRect(x-1,y+7,6,3); // ring area
  ctx.fillStyle='#aabbcc';
  ctx.fillRect(x+1,y-7,2,14); // highlight
  // chain links
  ctx.fillStyle='#888899';
  for(let i=0;i<3;i++) ctx.fillRect(x+1,-8+y-i*5,2,4);
}
function drawSteeringWheel(ctx, x, y) {
  ctx.fillStyle='#774422';
  // spokes
  const spokes=[[0,-8],[7,-7],[-7,-7],[0,8]];
  spokes.forEach(([sx,sy])=>{ ctx.fillRect(x+sx-1,y+sy-1,3,3); });
  ctx.fillRect(x-1,y-8,2,16); ctx.fillRect(x-8,y-1,16,2);
  // rim (pixel circle approx)
  const rim=[[0,-9],[4,-8],[7,-5],[8,-1],[7,4],[4,7],[0,8],[-4,7],[-7,4],[-8,-1],[-7,-5],[-4,-8]];
  ctx.fillStyle='#996633';
  rim.forEach(([rx,ry])=>ctx.fillRect(x+rx,y+ry,3,3));
  // hub
  ctx.fillStyle='#cc8844'; ctx.fillRect(x-3,y-3,6,6);
  ctx.fillStyle='#eeaa66'; ctx.fillRect(x-2,y-2,3,3);
}
function drawNet(ctx, x, y, w, h) {
  ctx.strokeStyle='rgba(200,200,160,0.45)'; ctx.lineWidth=1;
  for(let gy=y;gy<y+h;gy+=7) { ctx.beginPath(); ctx.moveTo(x,gy); ctx.lineTo(x+w,gy); ctx.stroke(); }
  for(let gx=x;gx<x+w;gx+=7) { ctx.beginPath(); ctx.moveTo(gx,y); ctx.lineTo(gx,y+h); ctx.stroke(); }
}
function drawPipe(pipe) {
  const x=pipe.x,top=pipe.top,botY=top+pipe.gap;
  const c1=holsteinModus?'#886600':'#004488', c2=holsteinModus?'#aa8800':'#003366';
  const cap=holsteinModus?'#ffaa00':'#e30613', capHi=holsteinModus?'#ffcc44':'#ff3333';
  // Use pipe.seed for consistent decoration per pipe
  if(!pipe.seed) pipe.seed=Math.floor(Math.random()*1000);
  const seed=pipe.seed;
  // TOP PIPE BODY
  for(let y=18;y<top;y+=8) {
    ctx.fillStyle=y%16===0?c1:c2; ctx.fillRect(x,y,PIPE_W,8);
    ctx.fillStyle='rgba(100,180,255,0.1)'; ctx.fillRect(x,y,4,8);
  }
  // NET overlay on top pipe
  if(top>40) drawNet(ctx, x, 18, PIPE_W, top-18);
  // SEAWEED on top pipe (2 patches)
  if(top>50) {
    drawSeaweed(ctx, x+4, top-30, 28, seed);
    drawSeaweed(ctx, x+PIPE_W-10, top-20, 18, seed+7);
  }
  // TOP CAP
  ctx.fillStyle=cap; ctx.fillRect(x-5,top-14,PIPE_W+10,14);
  ctx.fillStyle=capHi; ctx.fillRect(x-5,top-14,PIPE_W+10,5);
  ctx.fillStyle='#ffffff'; ctx.fillRect(x-5,top-9,PIPE_W+10,3);
  // BOTTOM PIPE BODY
  for(let y=botY;y<H-18;y+=8) {
    ctx.fillStyle=y%16===0?c1:c2; ctx.fillRect(x,y,PIPE_W,8);
    ctx.fillStyle='rgba(100,180,255,0.1)'; ctx.fillRect(x,y,4,8);
  }
  // NET overlay on bottom pipe
  const botH=H-18-botY;
  if(botH>20) drawNet(ctx, x, botY+14, PIPE_W, botH-14);
  // SEAWEED on bottom pipe
  if(botH>50) {
    drawSeaweed(ctx, x+6, botY+14, botH-30, seed+3);
    drawSeaweed(ctx, x+PIPE_W-12, botY+14, botH-25, seed+11);
  }
  // BOTTOM CAP
  ctx.fillStyle=cap; ctx.fillRect(x-5,botY,PIPE_W+10,14);
  ctx.fillStyle=capHi; ctx.fillRect(x-5,botY,PIPE_W+10,5);
  ctx.fillStyle='#ffffff'; ctx.fillRect(x-5,botY+5,PIPE_W+10,3);
  // DECORATION: anchor or steering wheel based on seed
  const decType=seed%3;
  if(decType===0&&top>60) {
    ctx.save(); ctx.translate(x+PIPE_W/2,top-40); drawAnchor(ctx,0,0); ctx.restore();
  } else if(decType===1&&top>60) {
    ctx.save(); ctx.translate(x+PIPE_W/2,top-35); drawSteeringWheel(ctx,0,0); ctx.restore();
  }
  // bottom pipe decoration
  const decType2=(seed+1)%3;
  if(decType2===0&&botH>60) {
    ctx.save(); ctx.translate(x+PIPE_W/2,botY+45); drawAnchor(ctx,0,0); ctx.restore();
  } else if(decType2===1&&botH>60) {
    ctx.save(); ctx.translate(x+PIPE_W/2,botY+40); drawSteeringWheel(ctx,0,0); ctx.restore();
  }
  // Neon outline glow
  ctx.save(); ctx.shadowColor=holsteinModus?'#ffaa00':'#e30613'; ctx.shadowBlur=10;
  ctx.strokeStyle=holsteinModus?'#ffcc44':'#ff4444'; ctx.lineWidth=1.5;
  ctx.strokeRect(x-5,top-14,PIPE_W+10,14); ctx.strokeRect(x-5,botY,PIPE_W+10,14);
  ctx.restore();
}

function drawStorch(h) {
  if(h.collected) return;
  h.bob+=0.08; const bobY=Math.sin(h.bob)*4;
  ctx.save(); ctx.translate(h.x,h.y+bobY);
  if(h.missed) ctx.globalAlpha=0.3;
  if(h.gold) {
    // Golden storch – pulsing glow
    const pulse=0.7+Math.sin(h.bob*3)*0.3;
    ctx.shadowColor='#ffdd00'; ctx.shadowBlur=18*pulse;
    ctx.fillStyle='#ffdd00'; ctx.fillRect(-11,-5,22,10);
    ctx.fillStyle='#fff8aa'; ctx.fillRect(-9,-3,15,6);
    ctx.fillStyle='#cc8800'; ctx.fillRect(-7,-5,12,3);
    ctx.fillStyle='#ffcc00'; ctx.fillRect(9,-6,6,4); ctx.fillRect(9,3,6,4);
    ctx.shadowBlur=0;
    ctx.fillStyle='#000'; ctx.fillRect(-6,-2,3,3);
    ctx.fillStyle='#fff'; ctx.fillRect(-5,-2,1,1);
    ctx.fillStyle='#ff6600'; ctx.fillRect(-3,-1,2,2);
    ctx.fillStyle='rgba(255,255,180,0.7)'; ctx.fillRect(-4,-4,7,2);
    // crown
    ctx.fillStyle='#ffdd00';
    ctx.fillRect(-5,-9,2,4); ctx.fillRect(-1,-10,2,5); ctx.fillRect(3,-9,2,4);
    ctx.fillStyle='#ff4400'; ctx.fillRect(-5,-9,2,2); ctx.fillRect(-1,-10,2,2); ctx.fillRect(3,-9,2,2);
  } else {
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=14;
    ctx.fillStyle='#ddeeff'; ctx.fillRect(-11,-5,22,10);
    ctx.fillStyle='#ffffff'; ctx.fillRect(-9,-3,15,6);
    ctx.fillStyle='#0066dd'; ctx.fillRect(-7,-5,12,3);
    ctx.fillStyle='#99bbdd'; ctx.fillRect(9,-6,6,4); ctx.fillRect(9,3,6,4);
    ctx.shadowBlur=0;
    ctx.fillStyle='#000'; ctx.fillRect(-6,-2,3,3);
    ctx.fillStyle='#fff'; ctx.fillRect(-5,-2,1,1);
    ctx.fillStyle='#ee1111'; ctx.fillRect(-3,-1,2,2);
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fillRect(-4,-4,7,2);
  }
  ctx.restore();
}

function drawPlayer() {
  const p=player;
  const charImg=selectedChar==='ship'?shipCanvas:faceCanvas;
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
  if(charImg) {
    const s=p.size*1.2;
    if(holsteinModus) {
      ctx.shadowColor='#ffdd00';
      ctx.shadowBlur=20+Math.sin(frame*0.3)*8;
      const hue=(frame*4)%360;
      ctx.save(); ctx.strokeStyle=`hsl(${hue},100%,60%)`; ctx.lineWidth=3;
      ctx.strokeRect(-s/2,-s/2,s,s); ctx.restore();
    } else {
      ctx.shadowColor=selectedChar==='ship'?'#e30613':'#0044ff';
      ctx.shadowBlur=15;
    }
    ctx.drawImage(charImg,-s/2,-s/2,s,s);
    ctx.shadowBlur=0;
  }
  ctx.restore();
  if(gameState==='playing'&&frame%3===0) {
    player.bubbles.push({
      x:player.x-(player.size*0.42),y:player.y+(Math.random()-0.5)*12,
      r:1.5+Math.random()*2.5,alpha:0.7,vy:-(0.4+Math.random()*0.5),
      color:holsteinModus?'#ffdd00':'#aaccff'
    });
  }
  player.bubbles.forEach(b=>{
    b.x-=1.5; b.y+=b.vy; b.alpha-=0.018;
    ctx.save(); ctx.globalAlpha=b.alpha; ctx.strokeStyle=b.color||'#aaccff'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
  });
  player.bubbles=player.bubbles.filter(b=>b.alpha>0);
}

function drawParticles() {
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.alpha-=1/p.life;
    if(p.alpha<=0){particles.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

function drawHolsteinTimer() {
  if(!holsteinModus) return;
  const pct=holsteinTimer/840;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(10,22,W-20,6);
  const cg=ctx.createLinearGradient(10,0,W-10,0);
  cg.addColorStop(0,'#ffdd00'); cg.addColorStop(1,'#ff6600');
  ctx.fillStyle=cg; ctx.fillRect(10,22,(W-20)*pct,6);
  ctx.strokeStyle='#ffaa00'; ctx.lineWidth=1; ctx.strokeRect(10,22,W-20,6);
  ctx.save(); ctx.font='6px "Press Start 2P",monospace';
  ctx.fillStyle='#ffdd00'; ctx.textAlign='center';
  ctx.shadowColor='#ffdd00'; ctx.shadowBlur=6;
  ctx.fillText('⭐ HOLSTEIN-MODUS ⭐',W/2,20); ctx.restore();
}

// ---- COLLISION ----
function checkCollision() {
  if(holsteinModus) return false;
  const pr=player.size/2-9;
  if(player.y-pr<18||player.y+pr>H-18) return true;
  for(const pipe of pipes) {
    if(player.x+pr>pipe.x&&player.x-pr<pipe.x+PIPE_W)
      if(player.y-pr<pipe.top||player.y+pr>pipe.top+pipe.gap) return true;
  }
  return false;
}

// ---- UPDATE ----
function update() {
  if(gameState!=='playing') return;
  frame++;
  if(holsteinModus) { holsteinTimer--; if(holsteinTimer<=0){holsteinModus=false;holsteinPips=0;} }
  player.vy+=GRAVITY; player.vy=Math.min(player.vy,10);
  player.y+=player.vy;
  player.angle=Math.min(Math.max(player.vy*0.055,-0.42),0.7);
  if(frame===1||frame%110===0) spawnPipe();
  pipes.forEach(p=>{
    p.x-=PIPE_SPEED;
    if(!p.storchSpawned&&p.x<W-60&&p.hasStorch){p.storchSpawned=true;spawnStorch(p);}
    if(!p.scored&&p.x+PIPE_W<player.x){
      p.scored=true; score++;
      spawnParticles(player.x,player.y,['#4499ff','#ffffff'],6);
      playScore();
    }
  });
  for(let i=pipes.length-1;i>=0;i--) if(pipes[i].x+PIPE_W<-10) pipes.splice(i,1);
  storche.forEach(h=>{
    h.x-=PIPE_SPEED;
    if(!h.collected&&!h.missed) {
      if(h.x<player.x-player.size) h.missed=true;
      const dx=h.x-player.x,dy=h.y-player.y;
      if(Math.sqrt(dx*dx+dy*dy)<player.size/2+18) {
        h.collected=true; score+=5; storcheCaught++;
        spawnHolsteinKonfetti(h.x,h.y);
        // Pips & Holstein-Modus – music only on activation
        if(!holsteinModus) {
          holsteinPips++;
          if(holsteinPips>=5) {
            holsteinModus=true; holsteinTimer=840; holsteinPips=5;
            playHolsteinFanfare();
            playHymne();
            spawnHolsteinKonfetti(player.x,player.y);
            spawnHolsteinKonfetti(player.x+35,player.y-25);
            spawnHolsteinKonfetti(player.x-35,player.y+25);
          }
        }
      }
    }
  });
  for(let i=storche.length-1;i>=0;i--) if(storche[i].x<-25) storche.splice(i,1);
  updatePipsUI();
  if(checkCollision()) {
    gameState='dead'; player.dead=true;
    if(score>hiScore) hiScore=score;
    stopHymne();
    spawnParticles(player.x,player.y,['#e30613','#ffffff','#0055dd'],20);
    playDeath();
    inputBlocked=true;
    setTimeout(()=>{
      inputBlocked=false;
      if(isTop5(score)) showNameInput();
      else showGameOver(loadHighscores(), null);
    },2000);
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawBG(); pipes.forEach(drawPipe); storche.forEach(drawStorch);
  drawPlayer(); drawParticles(); drawHolsteinTimer();
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('hiDisplay').textContent=hiScore;
}

// ---- HIGHSCORE TABLE HTML ----
function renderHSTable(list,highlightPts) {
  if(!list||list.length===0) return '<div style="font-size:7px;color:#445566;margin:6px 0">Noch kein Eintrag</div>';
  let rows='';
  let highlighted=false;
  list.forEach((e,i)=>{
    const isNew=!highlighted&&e.pts===highlightPts;
    if(isNew) highlighted=true;
    rows+=`<tr>
      <td class="hs-rank">#${i+1}</td>
      <td class="hs-name ${isNew?'hs-new':''}">${e.name}</td>
      <td class="hs-pts ${isNew?'hs-new':''}">${e.pts}</td>
      <td class="hs-fish">🦢${e.fish}</td>
    </tr>`;
  });
  return `<table class="hs-table">${rows}</table>`;
}

// ---- NAME INPUT SCREEN ----
function showNameInput() {

    <div style="font-size:13px;color:#ffdd00;text-shadow:0 0 12px #ffaa00;margin-bottom:6px">🏆 TOP 5!</div>
    <div style="font-size:9px;color:#fff;margin-bottom:4px">TORE: <span style="color:#ffff88">${score}</span></div>
    <div style="font-size:8px;color:#88aadd;margin-bottom:14px">🦢 STÖRCHE: ${storcheCaught}</div>
    <div style="font-size:8px;color:#aaccff;margin-bottom:8px;text-shadow:0 0 5px #4499ff">DEIN NAME:</div>

    <button class="btn red" id="saveBtn" style="margin-top:8px">💾 SPEICHERN</button>

  `;
  ov.style.display='flex';

  const input=document.getElementById('nameInput');
  const saveBtn=document.getElementById('saveBtn');

  // Auto-focus input (slight delay for mobile)

function showCharSelect() {

    c.width=70; c.height=70; c.style.cssText='width:70px;height:70px';

    return c;
  };
  ov.innerHTML=`
    <div style="font-size:18px;margin-bottom:6px">🦢🔵⚪🔴</div>
    <div style="font-size:14px;color:#fff;text-shadow:0 0 15px #0055dd;line-height:1.5;margin-bottom:3px">
      HOLSTEIN<br><span style="color:#e30613;text-shadow:0 0 15px #e30613">STÖRCHE</span>
    </div>
    <div style="font-size:7px;color:#aaccff;margin:5px 0 8px;text-shadow:0 0 5px #4499ff">~ GEBURTSTAGS EDITION ~</div>
    <div style="font-size:8px;color:#fff;margin-bottom:8px;text-shadow:0 0 8px #4499ff">WÄHLE DEINEN CHARAKTER:</div>
    <div class="char-select">
      <div class="char-card selected" id="cardFace" onclick="selectChar('face')">
        <div id="previewFace"></div>
        <div class="char-label">THIEMO<br>🧔</div>
        <div class="selected-badge" id="badgeFace">✓</div>
      </div>
      <div class="char-card" id="cardShip" onclick="selectChar('ship')">
        <div id="previewShip"></div>
        <div class="char-label">STÖRCHE<br>🦢</div>
        <div class="selected-badge" id="badgeShip" style="display:none">✓</div>
      </div>
    </div>
    <button class="btn" id="startBtn" style="margin-top:8px">🦢 ANSTOSS!</button>
    <div style="font-size:6px;color:#334455;margin-top:5px">LEERTASTE / KLICK / TOUCH</div>
  `;
  ov.style.display='flex';
  document.getElementById('previewFace').appendChild(makePreview(faceCanvas));
  document.getElementById('previewShip').appendChild(makePreview(shipCanvas));
  document.getElementById('startBtn').addEventListener('click',e=>{e.stopPropagation();startGame();});
}

function selectChar(which) {
  selectedChar=which;
  document.getElementById('cardFace').classList.toggle('selected',which==='face');
  document.getElementById('cardShip').classList.toggle('selected',which==='ship');
  document.getElementById('badgeFace').style.display=which==='face'?'block':'none';
  document.getElementById('badgeShip').style.display=which==='ship'?'block':'none';
}

function startGame() {
  if(inputBlocked) return;
  score=0; frame=0; pipeCount=0; storcheCaught=0;
  holsteinPips=0; holsteinModus=false; holsteinTimer=0;
  nextStorchAt=3+Math.floor(Math.random()*3);
  pipes.length=0; storche.length=0; particles.length=0;
  resetPlayer();
  document.getElementById('overlay').style.display='none';
  gameState='playing';
}

function jump() {
  if(inputBlocked) return;
  // Don't jump if user is typing in name input
  if(document.getElementById('nameInput')===document.activeElement) return;
  if(gameState==='playing') {
    player.vy=JUMP; playJump();
    for(let i=0;i<5;i++) player.bubbles.push({
      x:player.x-(player.size*0.45)+(Math.random()-0.5)*8,
      y:player.y+(Math.random()-0.5)*8,
      r:2+Math.random()*3,alpha:0.9,vy:-(0.9+Math.random()),
      color:holsteinModus?'#ffdd00':'#aaccff'
    });
  } else if(gameState!=='charselect') {
    startGame();
  }
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('nameInput')===document.activeElement) return;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}
});
document.getElementById('game-container').addEventListener('click',e=>{
  if(document.getElementById('nameInput')===document.activeElement) return;
  jump();
});
document.getElementById('game-container').addEventListener('touchstart',e=>{
  if(document.getElementById('nameInput')===document.activeElement) return;
  e.preventDefault(); jump();
},{passive:false});

loadHymne();
if(imagesReady>=2) showCharSelect();
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
